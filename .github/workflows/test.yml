name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: echo 'DATABASE_URL="postgresql://postgres:postgres@localhost:5777/deadlock_test"' > .env

      - name: Start PostgreSQL
        run: docker compose up -d

      - name: Wait for database
        run: sleep 2

      - name: Push Prisma schema
        run: npx prisma db push

      - name: Run tests
        run: npm test
